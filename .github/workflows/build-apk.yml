name: 🏗️ Сборка APK

# Запускается при каждом обновлении main + можно запустить вручную
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Сборка Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: ☕ Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Установить Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🤖 Установить Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Установить pwa2apk
        run: npm install -g pwa2apk

      - name: 🏗️ Собрать APK
        run: |
          pwa2apk \
            --url "https://romangevorgyan09-bit.github.io/pvz-graphik/" \
            --name "ПВЗ График" \
            --package "com.pvz.schedule" \
            --output ./dist
        continue-on-error: true

      - name: 📤 Загрузить APK
        uses: actions/upload-artifact@v4
        with:
          name: pvz-graphik-apk
          path: |
            ./dist/*.apk
            ./*.apk
          if-no-files-found: warn