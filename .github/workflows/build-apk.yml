name: 🏗️ Сборка APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: 🏗️ Создать простой WebView APK
        uses: r0adkll/web-to-apk-action@v1
        with:
          app-name: "График Смен"
          package-name: "com.mycompany.pvzgrafik"
          website-url: "https://romangevorgyan09-bit.github.io/pvz-graphik/"
          output-name: "pvz-graphik.apk"
          version-code: ${{ github.run_number }}
          version-name: "1.${{ github.run_number }}"

      - name: 📤 Создать Release и прикрепить APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Версия ${{ github.run_number }}
          draft: false
          prerelease: false
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
