name: 🏗️ Сборка APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: 🏗️ Создать APK (WebView обёртка)
        uses: darkshredder/web-to-app-action@main
        with:
          app-name: "График Смен"
          package-name: "com.mycompany.pvzgrafik"
          website-url: "https://romangevorgyan09-bit.github.io/pvz-graphik/"
          output-dir: "./dist"

      - name: 📤 Создать Release с APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Версия ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 🏗️ Собрать APK
        run: |
          mkdir -p ./dist
          pwa2apk \
            --url "https://romangevorgyan09-bit.github.io/pvz-graphik/" \
            --name "График Смен" \
            --package "com.mycompany.pvzgrafik" \
            --output ./dist \
            --icon "icons/icon-512.png" 2>/dev/null || echo "Иконка не найдена"
        continue-on-error: true

      - name: 📤 Создать Release и прикрепить APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Версия ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./dist/*.apk
            ./*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
