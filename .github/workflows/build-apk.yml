name: 🏗️ Сборка APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # Можно запускать вручную

jobs:
  build:
    name: Сборка Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: ☕ Установить Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Установить Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🤖 Установить Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Установить pwa2apk
        run: npm install -g pwa2apk

      - name: 🏗️ Собрать APK
        run: |
          pwa2apk \
            --url "https://romangevorgyan09-bit.github.io/pvz-graphik/" \
            --name "График Смен" \
            --package "com.mycompany.pvzgrafik" \
            --output ./dist \
            --icon "icons/icon-512.png" \
            --splash "icons/splash-icon.png"
        continue-on-error: true

      - name: 📤 Создать Release и прикрепить APK
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: v${{ github.run_number }}
          name: Версия ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            ./dist/*.apk
            ./*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
